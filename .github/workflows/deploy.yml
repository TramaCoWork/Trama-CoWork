name: Deploy to Production

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag de versión (ej: v1.3.0)'
        required: true
      description:
        description: 'Nota o motivo del deploy (opcional)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create git tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          MSG="${{ inputs.description }}"
          if [ -z "$MSG" ]; then MSG="${{ inputs.version }}"; fi
          git tag -a "${{ inputs.version }}" -m "$MSG"
          git push origin "${{ inputs.version }}"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Create production .env
        run: |
          echo "PORT=4321" >> .env
          echo "PUBLIC_API_BASE_URL=${{ vars.PUBLIC_API_BASE_URL }}" >> .env
          echo "PUBLIC_BASE_URL=${{ vars.PUBLIC_BASE_URL }}" >> .env
          echo "PUBLIC_TURNSTILE_SITE_KEY=${{ vars.PUBLIC_TURNSTILE_SITE_KEY }}" >> .env

      - run: npm run build

      - name: Upload maintenance page
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./.github/maintenance/
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}
          protocol: ftps
          dangerous-clean-slate: true

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}
          protocol: ftps
          dangerous-clean-slate: true
